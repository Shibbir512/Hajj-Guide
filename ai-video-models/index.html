<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best AI Video Generation Models 2025</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-video"></i> AI Video Generation Models Directory</h1>
            <p class="subtitle">Discover the best AI tools for creating stunning videos</p>
        </div>
    </header>

    <main class="container">
        <section class="filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search models...">
                <i class="fas fa-search"></i>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="text-to-video">Text-to-Video</button>
                <button class="filter-btn" data-filter="image-to-video">Image-to-Video</button>
                <button class="filter-btn" data-filter="free">Free/Paid</button>
            </div>
        </section>

        <section class="models-grid" id="modelsGrid">
            <!-- Models will be dynamically loaded -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 AI Video Models Directory. Last updated: May 2025</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
